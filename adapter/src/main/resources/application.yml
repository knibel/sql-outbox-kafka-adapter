# ─────────────────────────────────────────────────────────────────────────────
# SQL → Kafka Outbox Adapter – application.yml
#
# Copy this file and fill in your values. Every property is documented here.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: sql-outbox-kafka-adapter

  # ── DataSource (HikariCP) ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: myuser
    password: mypassword
    hikari:
      # Maximum number of connections in the pool.
      # Rule of thumb: number of poller threads × 2, minimum 10.
      maximum-pool-size: 10
      # Connection timeout (ms). Fail fast rather than queue forever.
      connection-timeout: 5000
      # How long a connection can sit idle before being evicted (ms).
      idle-timeout: 600000
      # Maximum lifetime of a connection in the pool (ms).
      max-lifetime: 1800000

# ── Embedded Tomcat ───────────────────────────────────────────────────────────
# This application serves no user traffic – only actuator health/metrics probes.
# Tune Tomcat down to a minimal footprint.
server:
  tomcat:
    threads:
      # Default is 200; a handful is plenty for actuator-only traffic.
      max: 4
      min-spare: 2
    # Default is 8192; keep a small number of open connections.
    max-connections: 20
    # Default is 100; tiny backlog matches the low connection count.
    accept-count: 5

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Expose /actuator/health/liveness and /actuator/health/readiness
      # for Kubernetes liveness / readiness probes.
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Outbox configuration
# ─────────────────────────────────────────────────────────────────────────────
outbox:

  # ── Kafka producer ──────────────────────────────────────────────────────────
  kafka:
    # Comma-separated list of Kafka broker addresses.
    bootstrap-servers: localhost:9092

    # Optional transactional ID prefix.
    # When non-empty, the producer uses Kafka transactions for strict
    # exactly-once semantics across JVM restarts (requires Kafka 2.5+).
    # Leave blank to use idempotent-only mode (recommended for most cases).
    transactional-id-prefix: ""

    # Additional KafkaProducer properties forwarded verbatim.
    # Example:
    #   producer-properties:
    #     compression.type: lz4
    #     linger.ms: 5
    producer-properties: {}

  # ── Outbox tables ────────────────────────────────────────────────────────────
  # One entry per outbox table. Multiple tables are polled concurrently,
  # each in its own virtual thread.
  #
  # After publishing each row is acknowledged according to the configured
  # acknowledgementStrategy (STATUS / DELETE / TIMESTAMP).
  # Any error during a poll cycle shuts the application down immediately
  # to preserve message ordering.
  tables:

    - # Name of the database table to poll. Required.
      tableName: orders_outbox

      # How often to poll for new rows (milliseconds). Default: 1000.
      pollIntervalMs: 500

      # Maximum rows per poll cycle. Default: 100.
      batchSize: 100

      # Primary-key column. Used for ordering, locking, and bulk UPDATEs.
      # Default: "id".
      idColumn: id

      # Column whose value becomes the Kafka record key.
      # When omitted, the value of idColumn is used as the Kafka key.
      keyColumn: aggregate_id

      # Column containing the JSON payload sent as the Kafka record value.
      # Default: "payload".
      payloadColumn: payload

      # Optional column containing a JSON object whose entries become Kafka
      # record headers. Example value: {"correlation-id": "abc123"}.
      # Omit or leave null to send no headers.
      headersColumn: headers_json

      # Column used to route each row to a specific Kafka topic.
      # When set, every row can target a different topic.
      # When omitted, staticTopic is used for all rows in this table.
      topicColumn: kafka_topic

      # Fallback topic when topicColumn is not configured.
      # Required if topicColumn is not set.
      staticTopic: orders

      # ── Acknowledgement strategy ───────────────────────────────────────────
      # How rows are acknowledged after being successfully published to Kafka.
      # Allowed values: STATUS (default), DELETE, TIMESTAMP.
      acknowledgementStrategy: STATUS

      # ── STATUS strategy settings ───────────────────────────────────────────
      # Required only when acknowledgementStrategy: STATUS.

      # Column that tracks processing status. Default: "status".
      statusColumn: status

      # Value that means "not yet processed". Default: "PENDING".
      pendingValue: PENDING

      # Value that means "successfully published to Kafka". Default: "DONE".
      doneValue: DONE

      # ── TIMESTAMP strategy settings ────────────────────────────────────────
      # Required only when acknowledgementStrategy: TIMESTAMP.

      # Column into which NOW() is written after a row is published.
      # Rows with NULL in this column are treated as pending.
      # processedAtColumn: processed_at

      # ── Row mapping ──────────────────────────────────────────────────────
      # How SQL row columns are mapped to the Kafka record value (payload).
      #
      # By default (when no `mappings` list is configured), the adapter reads
      # a pre-serialized JSON string from `payloadColumn`.
      #
      # To customize mapping, use the `mappings` list.  Rules are evaluated
      # top-to-bottom; once a column is claimed by a rule, later rules skip it.
      #
      # Example: convert all columns to camelCase
      #   mappings:
      #     - source: "*"
      #       target: _camelCase
      #
      # Example: explicit column mapping with nested objects
      #   mappings:
      #     - source: order_id
      #       target: orderId
      #       dataType: STRING
      #     - source: total_amount
      #       target: totalAmount
      #       dataType: DOUBLE
      #     - source: customer_name
      #       target: customer.name
      #
      # Example: inject a static value
      #   mappings:
      #     - value: "OrderCreated"
      #       target: eventType
      #     - source: "*"
      #       target: _camelCase
      #
      # Example: regex patterns with group/list mapping
      #   mappings:
      #     - source: /new_(.*)/
      #       target: modifications
      #       group:
      #         by: $1
      #         keyProperty: attribute
      #         property: after
      #     - source: /old_(.*)/
      #       target: modifications
      #       group:
      #         by: $1
      #         keyProperty: attribute
      #         property: before
logging:
  level:
    org.apache.kafka.clients: WARN
