# ─────────────────────────────────────────────────────────────────────────────
# sql-outbox-kafka-adapter – Example configuration for replacing
# RpsAdrRepository / RpsAdrStatusRepository
#
# This configuration replicates the polling logic of two repository classes:
#
# 1. RpsAdrRepository.selectNewRpsAdr()
#    Polls RPS_ADR for rows that have a matching entry in RPS_ADR_STATUS
#    (cross-table EXISTS join).  Each row is published as a
#    "BerechnungAnfrage.BestandsKunden_anfragen" event and then deleted.
#
# 2. RpsAdrStatusRepository.selectNewRpsAdrStatus()
#    Polls RPS_ADR_STATUS for rows where DATEN_ABGEHOLT_JN = 0 and no
#    matching RPS_ADR row remains (NOT EXISTS).  Each row is published as a
#    "BatchlaufStatus.BatchlaufinfoBereitgestellt" event and then acknowledged
#    by setting DATEN_ABGEHOLT_JN = 1 and DATEN_ABHOLUNG_DAT = now.
#
# The combined flow:
#   ADR rows visible  →  BerechnungAnfrage published  →  ADR row deleted
#   (repeat for every ADR record in the batch)
#   All ADR rows deleted  →  STATUS row visible  →  BatchlaufinfoBereitgestellt
#   published  →  DATEN_ABGEHOLT_JN = 1 set
#
# NOTE: Oracle stores unquoted DDL identifiers in uppercase.  All column and
# table names below are therefore uppercase to match the Oracle schema.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: rps-adr-outbox-adapter

  datasource:
    # Replace with your Oracle JDBC URL, username, and password.
    url: jdbc:oracle:thin:@//oracle-host:1521/MYDB
    username: myuser
    password: mypassword
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000

outbox:

  kafka:
    bootstrap-servers: kafka-broker:9092
    # Uncomment and set a prefix to enable Kafka transactions (exactly-once).
    # transactional-id-prefix: rps-adr-outbox

  tables:

    # ── Table 1: RPS_ADR ──────────────────────────────────────────────────────
    #
    # Replaces: RpsAdrRepository.selectNewRpsAdr() + delete()
    #
    # Selection: only rows that have a matching entry in RPS_ADR_STATUS are
    # picked up (same logic as the EXISTS sub-select in selectNewRpsAdr).
    #
    # Acknowledgement: the row is deleted after a successful Kafka publish
    # (matches the delete() call in the original application).
    #
    # Kafka message: BerechnungAnfrageDto –
    #   {
    #     "ereignistyp": "BerechnungAnfrage.BestandsKunden_anfragen",
    #     "ereignisdaten": {
    #       "firma": "1",
    #       "kundeId": <BK_ADR_NUMMER>,
    #       "bestandsKunden": {
    #         "stichtag":   "<BK_STICHTAG_DAT>",
    #         "ausfallflag": <KUNDE_AUSGEFALLEN_KNZ>,
    #         "doppelkunde": <DOPPELKUNDE_KNZ>,
    #         "umsatz":      <UMSATZ_BTR>,
    #         "summe":       <KNE_OBLIGO_BTR>,
    #         "summe_vom":   "<KNE_OBLIGO_TS>",
    #         "ext_job_id":  <EXT_JOB_ID>
    #       }
    #     }
    #   }
    #
    # Note: "firma" is a static constant.  Adjust the value for your
    # environment.  Static fields are always serialised as JSON strings; if
    # the consumer expects a JSON number, apply a type cast on the consumer
    # side or extend the adapter with a custom PayloadMapper.
    # ─────────────────────────────────────────────────────────────────────────
    - tableName: RPS_ADR

      idColumn: EXT_LOAD_ID
      keyColumn: BK_ADR_NUMMER

      staticTopic: berechnung-anfrage

      pollIntervalMs: 500
      batchSize: 100
      skipDelayOnFullBatch: true

      # Custom SELECT – mirrors selectNewRpsAdr()'s EXISTS join.
      customQuery: >
        SELECT * FROM RPS_ADR t1
        WHERE EXISTS (
          SELECT 1 FROM RPS_ADR_STATUS t2
          WHERE t2.STICHTAG_DAT      = t1.BK_STICHTAG_DAT
          AND   t2.DWH_JOB_ID_BATCH  = t1.EXT_JOB_ID
        )

      # Acknowledgement: delete the row – mirrors delete().
      acknowledgementStrategy: CUSTOM
      customAcknowledgementQuery: >
        DELETE FROM RPS_ADR WHERE EXT_LOAD_ID = ?

      # Row mapping: build BerechnungAnfrageDto JSON from flat columns.
      rowMappingStrategy: CUSTOM

      fieldMappings:
        BK_ADR_NUMMER:
          name: ereignisdaten.kundeId
          dataType: LONG
        BK_STICHTAG_DAT:
          name: ereignisdaten.bestandsKunden.stichtag
          dataType: DATE
          format: "yyyy-MM-dd"
        EXT_JOB_ID:
          name: ereignisdaten.bestandsKunden.ext_job_id
          dataType: LONG
        KUNDE_AUSGEFALLEN_KNZ:
          name: ereignisdaten.bestandsKunden.ausfallflag
          dataType: BOOLEAN
        DOPPELKUNDE_KNZ:
          name: ereignisdaten.bestandsKunden.doppelkunde
          dataType: BOOLEAN
        UMSATZ_BTR:
          name: ereignisdaten.bestandsKunden.umsatz
          dataType: DECIMAL
        KNE_OBLIGO_BTR:
          name: ereignisdaten.bestandsKunden.summe
          dataType: DECIMAL
        KNE_OBLIGO_TS:
          name: ereignisdaten.bestandsKunden.summe_vom
          dataType: DATETIME
          format: "yyyy-MM-dd'T'HH:mm:ss"

      staticFields:
        ereignistyp: "BerechnungAnfrage.BestandsKunden_anfragen"
        # Constant company identifier – adjust as needed.
        ereignisdaten.firma: "1"

    # ── Table 2: RPS_ADR_STATUS ───────────────────────────────────────────────
    #
    # Replaces: RpsAdrStatusRepository.selectNewRpsAdrStatus() + update()
    #
    # Selection: rows where DATEN_ABGEHOLT_JN = 0 and no matching RPS_ADR row
    # exists (NOT EXISTS) – mirrors selectNewRpsAdrStatus().
    #
    # Acknowledgement: sets DATEN_ABGEHOLT_JN = 1 and writes the current
    # timestamp into DATEN_ABHOLUNG_DAT – mirrors update().
    #
    # Kafka message: BatchlaufinfoBereitgestelltDto –
    #   {
    #     "ereignistyp": "BatchlaufStatus.BatchlaufinfoBereitgestellt",
    #     "ereignisdaten": {
    #       "anzahlEintraege": <ANZ_ADR>,
    #       "stichtag":        "<STICHTAG_DAT>",
    #       "extJobId":        <DWH_JOB_ID_BATCH>
    #     }
    #   }
    # ─────────────────────────────────────────────────────────────────────────
    - tableName: RPS_ADR_STATUS

      idColumn: DWH_JOB_ID_BATCH
      keyColumn: DWH_JOB_ID_BATCH

      staticTopic: batchlauf-status

      pollIntervalMs: 500
      batchSize: 100

      # Custom SELECT – mirrors selectNewRpsAdrStatus()'s NOT EXISTS join.
      customQuery: >
        SELECT * FROM RPS_ADR_STATUS t1
        WHERE t1.DATEN_ABGEHOLT_JN = 0
        AND NOT EXISTS (
          SELECT 1 FROM RPS_ADR t2
          WHERE t2.BK_STICHTAG_DAT = t1.STICHTAG_DAT
          AND   t2.EXT_JOB_ID      = t1.DWH_JOB_ID_BATCH
        )

      # Acknowledgement: mirrors update() – set flag and timestamp.
      acknowledgementStrategy: CUSTOM
      customAcknowledgementQuery: >
        UPDATE RPS_ADR_STATUS
        SET DATEN_ABGEHOLT_JN = 1,
            DATEN_ABHOLUNG_DAT = CURRENT_TIMESTAMP
        WHERE DWH_JOB_ID_BATCH = ?

      # Row mapping: build BatchlaufinfoBereitgestelltDto JSON from flat columns.
      rowMappingStrategy: CUSTOM

      fieldMappings:
        ANZ_ADR:
          name: ereignisdaten.anzahlEintraege
          dataType: LONG
        STICHTAG_DAT:
          name: ereignisdaten.stichtag
          dataType: DATE
          format: "yyyy-MM-dd"
        DWH_JOB_ID_BATCH:
          name: ereignisdaten.extJobId
          dataType: LONG

      staticFields:
        ereignistyp: "BatchlaufStatus.BatchlaufinfoBereitgestellt"

logging:
  level:
    org.apache.kafka.clients: WARN
