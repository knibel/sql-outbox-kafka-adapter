# Test application context – overrides default application.yml.
# The OutboxPollerRegistry needs at least a valid datasource and kafka config
# to start; table configs are injected per-test via @SpringBootTest(properties).
spring:
  datasource:
    # Will be overridden by @DynamicPropertySource in integration tests
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
  # Disable schema auto-creation; tests manage their own DDL
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health

outbox:
  kafka:
    bootstrap-servers: localhost:9092   # overridden by @DynamicPropertySource
  tables: []
